# Full LLM sweep: Qwen2.5-7B-Instruct (second LLM model)
# Run: python run.py sweep --config configs/full_sweep_qwen25_7b.yaml

victim:
  backend: vllm
  model: Qwen/Qwen2.5-7B-Instruct
  base_url: http://localhost:8000/v1
  temperature: 0.7
  max_tokens: 512

judge:
  backend: vllm
  model: meta-llama/Meta-Llama-3.1-70B-Instruct
  base_url: http://localhost:8001/v1
  temperature: 0.0
  max_tokens: 8

data:
  source: harmbench
  data_dir: data/
  limit: 200

experiment:
  mode: sweep
  conditions: [C1, C2]
  templates: [chemistry_lab, legal_drafting, medical_consultation]
  injection_turns: [1, 2, 3, 4, 5, 6]
  conversation_length: 6
  seeds: [0, 1]

output:
  path: outputs/runs/full_sweep_qwen25_7b.jsonl
